<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Page Not Found | PlayMiniFun</title>
  <meta name="description" content="The page you are looking for could not be found.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body data-page="404">
  <div id="header-mount"></div>

  <main>
    <div class="container error-page">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you are looking for doesn't exist or has been moved.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:24px 0">
        <a href="index.html" class="btn btn-primary">Back to Home</a>
        <a href="games.html" class="btn btn-secondary">Browse Games</a>
      </div>
      <div id="error-search" style="max-width:480px;margin:0 auto"></div>
    </div>
  </main>

  <div id="footer-mount"></div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/games-data.js"></script>
  <script src="assets/js/render.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      await loadGames();
      mountLayout("404");
      const el = document.getElementById("error-search");
      if (el) el.innerHTML = renderSearchBox("");
    });
  </script>
</body>
</html>
